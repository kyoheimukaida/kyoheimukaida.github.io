name: Update recent papers

on:
  workflow_dispatch:
  schedule:
    # Monday 09:37 JST = Monday 00:37 UTC.
    - cron: "37 0 * * 1"

permissions:
  contents: write

jobs:
  update-recent-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README recent papers
        env:
          INSPIRE_QUERY: "a K.Mukaida.1"
        run: |
          python scripts/update_recent_papers.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update recent papers"
            git push
          fi
