name: Update publications

on:
  workflow_dispatch:
  schedule:
    # Every day at 09:27 JST.
    - cron: "27 9 * * *"
      timezone: "Asia/Tokyo"

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update publications page from INSPIRE
        env:
          INSPIRE_QUERY: "a K.Mukaida.1"
          RECENT_CITATION_WINDOW_DAYS: "1065"
          RECENT_CITATION_THRESHOLD: "5"
          RECENT_CITATION_SHARE_THRESHOLD: "0.0"
          RECENT_12M_BONUS_THRESHOLD: "3"
          NOTABLE_PUBLISHED_COUNT: "6"
          CITING_FETCH_SIZE: "150"
        run: |
          python scripts/update_publications.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add publications.md
          git add _data/publications_highlights.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update publications page"
            git pull --rebase
            git push
          fi
